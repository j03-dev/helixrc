[editor]
mouse = false
auto-format = true
line-number = "relative"
auto-save = true
color-modes = true
true-color = true
cursorline = true
scrolloff = 8
bufferline = "multiple"
popup-border = "popup"

end-of-line-diagnostics = "hint"
soft-wrap.enable = true

[editor.clipboard-provider.custom]
yank = { command = "xclip", args = ["-selection", "clipboard", "-o"] }
paste = { command = "xclip", args = ["-selection", "clipboard"] }
primary-yank = { command = "xclip", args = ["-selection", "primary", "-o"] }
primary-paste = { command = "xclip", args = ["-selection", "primary"] }

[editor.statusline]
left = ["mode", "spinner", "workspace-diagnostics", "file-name"]
center = []
right = ["version-control"]

[editor.gutters]
layout = ["spacer", "diff", "diagnostics", "line-numbers", "spacer"]

[editor.file-picker]
hidden = false

[keys.normal]
esc = ["collapse_selection", "keep_primary_selection"]
V = ["select_mode", "extend_to_line_bounds"]
u = ["undo", "collapse_selection"]
C-r = ["redo", "collapse_selection"]

H = "goto_previous_buffer"
L = "goto_next_buffer"

"]" = "goto_next_paragraph"
"[" = "goto_prev_paragraph"

C-A-l = ":format"
C-o = ":config-open"
C-s = ":config-reload"
C-x = ":buffer-close!"
C-j = "copy_selection_on_next_line"
C-k = "copy_selection_on_prev_line"

g.m = ["goto_last_modified_file", "goto_last_modification"]

"*" = [
  "move_char_right",
  "move_prev_word_start",
  "move_next_word_end",
  "search_selection",
  "search_next",
]

[keys.normal.space]
G = "changed_file_picker"
R = "@miw:clipboard-paste-replace<ret>"
g = [":write-all", ":insert-output lazygit> /dev/tty", ":redraw", ":reload-all"]
e = [
  ":sh rm -f /tmp/unique-file-h21a434",
  ":insert-output yazi '%{workspace_directory}' --chooser-file=/tmp/unique-file-h21a434",
  ":insert-output echo \"x1b[?1049h\" > /dev/tty",
  ":open %sh{cat /tmp/unique-file-h21a434}",
  ":reload-all",
  ":redraw",
]
h = "jump_view_left"
j = "jump_view_down"
k = "jump_view_up"
l = "jump_view_right"
d = "hover"
w.o = ["wonly", ":buffer-close-others!"]

[keys.insert]
esc = ["collapse_selection", "normal_mode"]
C-space = "completion"

[keys.select]
esc = ["collapse_selection", "normal_mode"]

"]" = "goto_next_paragraph"
"[" = "goto_prev_paragraph"

S = "surround_add"

C-j = "copy_selection_on_next_line"
C-k = "copy_selection_on_prev_line"

K = [
  "yank_main_selection_to_clipboard",
  "delete_selection",
  "move_line_up",
  "paste_clipboard_before",
  "select_mode",
]
J = [
  "yank_main_selection_to_clipboard",
  "delete_selection",
  "move_line_down",
  "paste_clipboard_before",
  "select_mode",
]
