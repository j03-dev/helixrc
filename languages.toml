[[language]]
name = "toml"
language-servers = ["crates-lsp"]
formatter = { command = "taplo", args = ["fmt", "-"] }

[language-server.crates-lsp]
command = "crates-lsp"
required-root-patterns = ["Cargo.toml"]
except-features = ["format"]

[[language]]
name = "jinja"
language-servers = ["tailwindcss-ls", "vscode-html-language-server"]

[[language]]
name = "tera"
language-servers = ["tailwindcss-ls", "vscode-html-language-server"]


[[language]]
name = "tsx"
shebangs = ["node"]
roots = ["tsconfig.json", "package.json"]
file-types = ["tsx"]
language-servers = ["typescript-language-server", "tailwindcss-ls"]

[[language]]
name = "python"
formatter = { command = "ruff", args = ["format", "-"] }
language-servers = ["pylsp"]

[language-server.pylsp.config.pylsp.plugins.pycodestyle]
ignore = ["E501", "E402"]

[language-server.ty]
command = "ty"
args = ["server"]

[[language]]
name = "scheme"
file-types = ["scm"]
language-servers = ["steel", "helix-assist"]
formatter = { command = "schemat" }
auto-format = true

[language-server.steel]
command = "steel-language-server"

[language-server.helix-assist]
command = "helix-assist"
args = ["--handler", "gemini", "--num-suggestions", "2"]
